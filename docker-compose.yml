version: "3.8"

services:
  # ============================================================================
  # SERVICIO DE BASE DE DATOS (MySQL)
  # ============================================================================
  db:
    image: mysql:8.0
    container_name: skinclinic-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mode321 #-- Cambia esto por tu contraseña o usa variables de entorno
      MYSQL_DATABASE: clinic_management_db
    ports:
      - "3306:3306" #-- Expone el puerto para que la extensión de VS Code se conecte
    volumes:
      # 1. Guarda los datos reales en tu carpeta local (asegúrate de que esté en tu .gitignore)
      - ./mysql_data:/var/lib/mysql
      # 2. Carga automáticamente el script maestro final que guardamos
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - skinclinic-network

  # ============================================================================
  # SERVICIO BACKEND (Node.js)
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=db #-- Node.js usará el nombre del servicio 'db' para conectarse en lugar de localhost
      - DB_USER=root
      - DB_PASSWORD=root_password_seguro
      - DB_NAME=clinic_management_db
    depends_on:
      - db #-- Asegura que el backend espere a que el contenedor de la BD esté listo
    networks:
      - skinclinic-network

  # ============================================================================
  # SERVICIO FRONTEND (Vite / React)
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_WATCH=true
    command: npm run dev -- --host
    networks:
      - skinclinic-network

networks:
  skinclinic-network:
    driver: bridge
