services:
  redis:
    image: redis:7-alpine
    container_name: skinclinic-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - skinclinic-network

  db:
    image: mysql:8.0
    container_name: skinclinic-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mode321
      MYSQL_DATABASE: clinic_management_db
      TZ: America/Monterrey
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmode321"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - skinclinic-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=mode321
      - DB_NAME=clinic_management_db
      - TZ=America/Monterrey
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - skinclinic-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_WATCH=true
    command: npm run dev -- --host
    networks:
      - skinclinic-network

networks:
  skinclinic-network:
    driver: bridge
